<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Stream - Spotify/YT Music Clone</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #121212;
            --bg-secondary: #181818;
            --bg-tertiary: #282828;
            --text-primary: #ffffff;
            --text-secondary: #b3b3b3;
            --accent: #1db954;
            --accent-hover: #1ed760;
            --yt-red: #ff0000;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 240px;
            background: var(--bg-primary);
            padding: 20px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #333;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo span {
            background: linear-gradient(135deg, var(--accent), var(--yt-red));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-item {
            padding: 12px 16px;
            color: var(--text-secondary);
            text-decoration: none;
            border-radius: 8px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nav-item:hover, .nav-item.active {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .nav-item i {
            font-size: 20px;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px 30px;
            padding-bottom: 100px;
        }

        .search-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--bg-primary);
            padding: 15px 0;
        }

        .search-input {
            flex: 1;
            max-width: 400px;
            padding: 12px 20px;
            border: none;
            border-radius: 25px;
            background: var(--bg-tertiary);
            color: var(--text-primary);
            font-size: 14px;
        }

        .search-input:focus {
            outline: 2px solid var(--accent);
        }

        .search-btn {
            padding: 12px 24px;
            background: var(--accent);
            border: none;
            border-radius: 25px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .search-btn:hover {
            background: var(--accent-hover);
        }

        /* Sections */
        .section {
            margin-bottom: 40px;
        }

        .section-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--bg-secondary);
            border-radius: 8px;
            padding: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .card:hover {
            background: var(--bg-tertiary);
        }

        .card-image {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 4px;
            margin-bottom: 12px;
            object-fit: cover;
            background: var(--bg-tertiary);
        }

        .card-title {
            font-weight: 600;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-subtitle {
            color: var(--text-secondary);
            font-size: 13px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Song List */
        .song-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .song-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .song-item:hover {
            background: var(--bg-tertiary);
        }

        .song-item.playing {
            background: var(--bg-tertiary);
        }

        .song-thumbnail {
            width: 50px;
            height: 50px;
            border-radius: 4px;
            object-fit: cover;
        }

        .song-info {
            flex: 1;
        }

        .song-name {
            font-weight: 500;
            margin-bottom: 4px;
        }

        .song-artist {
            color: var(--text-secondary);
            font-size: 13px;
        }

        .song-duration {
            color: var(--text-secondary);
            font-size: 13px;
        }

        /* Player Bar */
        .player-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 90px;
            background: var(--bg-secondary);
            border-top: 1px solid #333;
            display: flex;
            align-items: center;
            padding: 0 20px;
            z-index: 1000;
        }

        .now-playing {
            display: flex;
            align-items: center;
            gap: 15px;
            width: 30%;
        }

        .now-playing-img {
            width: 56px;
            height: 56px;
            border-radius: 4px;
            object-fit: cover;
        }

        .now-playing-info {
            flex: 1;
        }

        .now-playing-title {
            font-weight: 500;
            margin-bottom: 4px;
        }

        .now-playing-artist {
            color: var(--text-secondary);
            font-size: 12px;
        }

        .player-controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 40%;
        }

        .control-buttons {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 10px;
        }

        .control-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 18px;
            transition: color 0.2s;
        }

        .control-btn:hover {
            color: var(--text-primary);
        }

        .play-pause-btn {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: var(--text-primary);
            color: var(--bg-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .play-pause-btn:hover {
            transform: scale(1.05);
            color: var(--bg-primary);
        }

        .progress-container {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .progress-time {
            font-size: 11px;
            color: var(--text-secondary);
            min-width: 40px;
        }

        .progress-bar {
            flex: 1;
            height: 4px;
            background: #4d4d4d;
            border-radius: 2px;
            cursor: pointer;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: var(--text-primary);
            border-radius: 2px;
            width: 0%;
            transition: width 0.1s;
        }

        .progress-bar:hover .progress-fill {
            background: var(--accent);
        }

        .volume-controls {
            width: 30%;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 10px;
        }

        .volume-slider {
            width: 100px;
            height: 4px;
            background: #4d4d4d;
            border-radius: 2px;
            cursor: pointer;
        }

        .volume-fill {
            height: 100%;
            background: var(--text-primary);
            border-radius: 2px;
            width: 70%;
        }

        /* Loading */
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid var(--bg-tertiary);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Hidden audio element */
        #audio-player {
            display: none;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                display: none;
            }
            
            .now-playing {
                width: 50%;
            }
            
            .player-controls {
                width: 50%;
            }
            
            .volume-controls {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="logo">
                🎵 <span>MusicStream</span>
            </div>
            <div class="nav-item active" onclick="loadHome()">
                🏠 Home
            </div>
            <div class="nav-item" onclick="document.getElementById('search-input').focus()">
                🔍 Search
            </div>
            <div class="nav-item" onclick="showLikedSongs()">
                ❤️ Liked Songs
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <div class="search-bar">
                <input type="text" id="search-input" class="search-input" placeholder="Search for songs, artists, albums..." onkeypress="if(event.key === 'Enter') performSearch()">
                <button class="search-btn" onclick="performSearch()">Search</button>
            </div>

            <div id="content-area">
                <div class="loading">
                    <div class="spinner"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Player Bar -->
    <div class="player-bar">
        <div class="now-playing">
            <img src="" alt="" class="now-playing-img" id="np-image" style="display: none;">
            <div class="now-playing-info">
                <div class="now-playing-title" id="np-title">Not Playing</div>
                <div class="now-playing-artist" id="np-artist">Select a song</div>
            </div>
        </div>

        <div class="player-controls">
            <div class="control-buttons">
                <button class="control-btn" onclick="shuffle()" title="Shuffle">🔀</button>
                <button class="control-btn" onclick="previousTrack()" title="Previous">⏮</button>
                <button class="play-pause-btn" onclick="togglePlay()" id="play-pause-btn">▶</button>
                <button class="control-btn" onclick="nextTrack()" title="Next">⏭</button>
                <button class="control-btn" onclick="toggleRepeat()" title="Repeat">🔁</button>
            </div>
            <div class="progress-container">
                <span class="progress-time" id="current-time">0:00</span>
                <div class="progress-bar" onclick="seekTo(event)">
                    <div class="progress-fill" id="progress-fill"></div>
                </div>
                <span class="progress-time" id="duration">0:00</span>
            </div>
        </div>

        <div class="volume-controls">
            <span>🔊</span>
            <div class="volume-slider" onclick="setVolume(event)">
                <div class="volume-fill" id="volume-fill"></div>
            </div>
        </div>
    </div>

    <audio id="audio-player"></audio>

    <script>
        const API_BASE = '';
        let currentQueue = [];
        let currentIndex = -1;
        let isPlaying = false;
        let isShuffle = false;
        let repeatMode = 0; // 0: off, 1: all, 2: one
        let likedSongs = JSON.parse(localStorage.getItem('likedSongs') || '[]');

        const audioPlayer = document.getElementById('audio-player');
        const playPauseBtn = document.getElementById('play-pause-btn');
        const progressFill = document.getElementById('progress-fill');
        const currentTimeEl = document.getElementById('current-time');
        const durationEl = document.getElementById('duration');

        // Initialize
        window.onload = () => {
            loadHome();
            
            audioPlayer.addEventListener('timeupdate', updateProgress);
            audioPlayer.addEventListener('loadedmetadata', () => {
                durationEl.textContent = formatTime(audioPlayer.duration);
            });
            audioPlayer.addEventListener('ended', handleSongEnd);
        };

        // Load Home Page
        async function loadHome() {
            document.getElementById('content-area').innerHTML = '<div class="loading"><div class="spinner"></div></div>';
            
            try {
                const response = await fetch(`${API_BASE}/api/home`);
                const data = await response.json();
                
                if (data.success) {
                    renderHome(data.data);
                } else {
                    showError('Failed to load home feed');
                }
            } catch (error) {
                showError('Error loading home: ' + error.message);
            }
        }

        // Render Home
        function renderHome(homeData) {
            let html = '';
            
            homeData.forEach(section => {
                if (section.contents && section.contents.length > 0) {
                    html += `<div class="section">`;
                    html += `<h2 class="section-title">${section.title}</h2>`;
                    html += `<div class="cards-grid">`;
                    
                    section.contents.forEach(item => {
                        const image = item.thumbnail ? (Array.isArray(item.thumbnail) ? item.thumbnail[item.thumbnail.length - 1].url : item.thumbnail) : '';
                        const subtitle = item.artists ? item.artists.map(a => a.name).join(', ') : (item.description || '');
                        
                        html += `
                            <div class="card" onclick="handleCardClick('${item.videoId || item.browseId}', '${item.resultType || 'song'}')">
                                <img src="${image}" alt="${item.title}" class="card-image" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect fill=%22%23282828%22 width=%22100%22 height=%22100%22/><text x=%2250%22 y=%2250%22 text-anchor=%22middle%22 fill=%22%23b3b3b3%22 font-size=%2240%22>🎵</text></svg>'">
                                <div class="card-title">${item.title}</div>
                                <div class="card-subtitle">${subtitle}</div>
                            </div>
                        `;
                    });
                    
                    html += `</div></div>`;
                }
            });
            
            document.getElementById('content-area').innerHTML = html;
        }

        // Perform Search
        async function performSearch() {
            const query = document.getElementById('search-input').value.trim();
            if (!query) return;
            
            document.getElementById('content-area').innerHTML = '<div class="loading"><div class="spinner"></div></div>';
            
            try {
                const response = await fetch(`${API_BASE}/api/search?q=${encodeURIComponent(query)}&limit=30`);
                const data = await response.json();
                
                if (data.success) {
                    renderSearchResults(data.data, query);
                } else {
                    showError('Search failed');
                }
            } catch (error) {
                showError('Search error: ' + error.message);
            }
        }

        // Render Search Results
        function renderSearchResults(results, query) {
            let html = `<div class="section"><h2 class="section-title">Results for "${query}"</h2>`;
            
            // Separate by type
            const songs = results.filter(r => r.resultType === 'song');
            const videos = results.filter(r => r.resultType === 'video');
            const albums = results.filter(r => r.resultType === 'album');
            const artists = results.filter(r => r.resultType === 'artist');
            
            if (songs.length > 0) {
                html += `<div class="section"><h3>Songs</h3><div class="song-list">`;
                songs.slice(0, 10).forEach(song => {
                    const image = song.thumbnail ? (Array.isArray(song.thumbnail) ? song.thumbnail[song.thumbnail.length - 1].url : song.thumbnail) : '';
                    html += `
                        <div class="song-item" onclick="playSong('${song.videoId}')">
                            <img src="${image}" alt="${song.title}" class="song-thumbnail" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect fill=%22%23282828%22 width=%22100%22 height=%22100%22/><text x=%2250%22 y=%2250%22 text-anchor=%22middle%22 fill=%22%23b3b3b3%22 font-size=%2240%22>🎵</text></svg>'">
                            <div class="song-info">
                                <div class="song-name">${song.title}</div>
                                <div class="song-artist">${song.artists ? song.artists.map(a => a.name).join(', ') : ''}</div>
                            </div>
                            <div class="song-duration">${song.duration || ''}</div>
                        </div>
                    `;
                });
                html += `</div></div>`;
            }
            
            if (albums.length > 0) {
                html += `<div class="section"><h3>Albums</h3><div class="cards-grid">`;
                albums.slice(0, 6).forEach(album => {
                    const image = album.thumbnail ? (Array.isArray(album.thumbnail) ? album.thumbnail[album.thumbnail.length - 1].url : album.thumbnail) : '';
                    html += `
                        <div class="card" onclick="handleCardClick('${album.browseId}', 'album')">
                            <img src="${image}" alt="${album.title}" class="card-image">
                            <div class="card-title">${album.title}</div>
                            <div class="card-subtitle">${album.artists ? album.artists.map(a => a.name).join(', ') : ''}</div>
                        </div>
                    `;
                });
                html += `</div></div>`;
            }
            
            if (artists.length > 0) {
                html += `<div class="section"><h3>Artists</h3><div class="cards-grid">`;
                artists.slice(0, 6).forEach(artist => {
                    const image = artist.thumbnail ? (Array.isArray(artist.thumbnail) ? artist.thumbnail[artist.thumbnail.length - 1].url : artist.thumbnail) : '';
                    html += `
                        <div class="card" onclick="handleCardClick('${artist.browseId}', 'artist')">
                            <img src="${image}" alt="${artist.artist}" class="card-image" style="border-radius: 50%;">
                            <div class="card-title">${artist.artist}</div>
                            <div class="card-subtitle">Artist</div>
                        </div>
                    `;
                });
                html += `</div></div>`;
            }
            
            html += `</div>`;
            document.getElementById('content-area').innerHTML = html;
        }

        // Handle Card Click
        async function handleCardClick(id, type) {
            document.getElementById('content-area').innerHTML = '<div class="loading"><div class="spinner"></div></div>';
            
            try {
                let response;
                if (type === 'song' || type === 'video') {
                    await playSong(id);
                    return;
                } else if (type === 'album') {
                    response = await fetch(`${API_BASE}/api/album/${id}`);
                } else if (type === 'artist') {
                    response = await fetch(`${API_BASE}/api/artist/${id}`);
                } else if (type === 'playlist') {
                    response = await fetch(`${API_BASE}/api/playlist/${id}`);
                }
                
                const data = await response.json();
                
                if (data.success) {
                    if (type === 'album') {
                        renderAlbum(data.data);
                    } else if (type === 'artist') {
                        renderArtist(data.data);
                    } else if (type === 'playlist') {
                        renderPlaylist(data.data);
                    }
                } else {
                    showError('Failed to load details');
                }
            } catch (error) {
                showError('Error: ' + error.message);
            }
        }

        // Render Album
        function renderAlbum(album) {
            const image = album.thumbnails ? album.thumbnails[album.thumbnails.length - 1].url : '';
            
            let html = `
                <div class="section">
                    <div style="display: flex; gap: 20px; margin-bottom: 30px;">
                        <img src="${image}" alt="${album.title}" style="width: 230px; height: 230px; object-fit: cover; box-shadow: 0 4px 60px rgba(0,0,0,0.5);">
                        <div style="display: flex; flex-direction: column; justify-content: end;">
                            <span style="font-size: 12px; text-transform: uppercase;">Album</span>
                            <h1 style="font-size: 48px; font-weight: bold; margin: 10px 0;">${album.title}</h1>
                            <p style="color: var(--text-secondary);">${album.artists ? album.artists.map(a => a.name).join(', ') : ''} • ${album.year || ''}</p>
                        </div>
                    </div>
                    <div class="song-list">
            `;
            
            if (album.tracks) {
                album.tracks.forEach((track, index) => {
                    const videoId = track.videoId;
                    html += `
                        <div class="song-item" onclick="playSong('${videoId}')">
                            <span style="color: var(--text-secondary); width: 30px;">${index + 1}</span>
                            <div class="song-info">
                                <div class="song-name">${track.title}</div>
                                <div class="song-artist">${track.artists ? track.artists.map(a => a.name).join(', ') : ''}</div>
                            </div>
                            <div class="song-duration">${track.duration || ''}</div>
                        </div>
                    `;
                });
            }
            
            html += `</div></div>`;
            document.getElementById('content-area').innerHTML = html;
        }

        // Render Artist
        function renderArtist(artist) {
            const image = artist.thumbnails ? artist.thumbnails[artist.thumbnails.length - 1].url : '';
            
            let html = `
                <div class="section">
                    <div style="display: flex; align-items: end; gap: 20px; margin-bottom: 30px;">
                        <img src="${image}" alt="${artist.name}" style="width: 200px; height: 200px; border-radius: 50%; object-fit: cover;">
                        <div>
                            <span style="font-size: 12px; text-transform: uppercase;">Artist</span>
                            <h1 style="font-size: 48px; font-weight: bold; margin: 10px 0;">${artist.name}</h1>
                            <p style="color: var(--text-secondary);">${artist.subscribers || ''} subscribers</p>
                        </div>
                    </div>
            `;
            
            if (artist.songs && artist.songs.results) {
                html += `<h3>Songs</h3><div class="song-list">`;
                artist.songs.results.slice(0, 10).forEach(track => {
                    const videoId = track.videoId;
                    const thumb = track.thumbnail ? (Array.isArray(track.thumbnail) ? track.thumbnail[track.thumbnail.length - 1].url : track.thumbnail) : '';
                    html += `
                        <div class="song-item" onclick="playSong('${videoId}')">
                            <img src="${thumb}" alt="${track.title}" class="song-thumbnail">
                            <div class="song-info">
                                <div class="song-name">${track.title}</div>
                                <div class="song-artist">${track.artists ? track.artists.map(a => a.name).join(', ') : ''}</div>
                            </div>
                            <div class="song-duration">${track.duration || ''}</div>
                        </div>
                    `;
                });
                html += `</div>`;
            }
            
            html += `</div>`;
            document.getElementById('content-area').innerHTML = html;
        }

        // Render Playlist
        function renderPlaylist(playlist) {
            const image = playlist.thumbnails ? playlist.thumbnails[playlist.thumbnails.length - 1].url : '';
            
            let html = `
                <div class="section">
                    <div style="display: flex; gap: 20px; margin-bottom: 30px;">
                        <img src="${image}" alt="${playlist.title}" style="width: 230px; height: 230px; object-fit: cover; box-shadow: 0 4px 60px rgba(0,0,0,0.5);">
                        <div style="display: flex; flex-direction: column; justify-content: end;">
                            <span style="font-size: 12px; text-transform: uppercase;">Playlist</span>
                            <h1 style="font-size: 48px; font-weight: bold; margin: 10px 0;">${playlist.title}</h1>
                            <p style="color: var(--text-secondary);">${playlist.author?.name || ''} • ${playlist.trackCount || 0} songs</p>
                        </div>
                    </div>
                    <div class="song-list">
            `;
            
            if (playlist.tracks) {
                playlist.tracks.forEach((track, index) => {
                    const videoId = track.videoId;
                    const thumb = track.thumbnail ? (Array.isArray(track.thumbnail) ? track.thumbnail[track.thumbnail.length - 1].url : track.thumbnail) : '';
                    html += `
                        <div class="song-item" onclick="playSong('${videoId}')">
                            <span style="color: var(--text-secondary); width: 30px;">${index + 1}</span>
                            <img src="${thumb}" alt="${track.title}" class="song-thumbnail" style="width: 40px; height: 40px;">
                            <div class="song-info">
                                <div class="song-name">${track.title}</div>
                                <div class="song-artist">${track.artists ? track.artists.map(a => a.name).join(', ') : ''}</div>
                            </div>
                            <div class="song-duration">${track.duration || ''}</div>
                        </div>
                    `;
                });
            }
            
            html += `</div></div>`;
            document.getElementById('content-area').innerHTML = html;
        }

        // Play Song
        async function playSong(videoId) {
            try {
                const response = await fetch(`${API_BASE}/api/stream/${videoId}`);
                const data = await response.json();
                
                if (data.success) {
                    audioPlayer.src = data.url;
                    audioPlayer.play();
                    isPlaying = true;
                    playPauseBtn.textContent = '⏸';
                    
                    document.getElementById('np-title').textContent = data.title || 'Unknown';
                    document.getElementById('np-artist').textContent = 'Now Playing';
                    
                    const npImage = document.getElementById('np-image');
                    if (data.thumbnail) {
                        npImage.src = data.thumbnail;
                        npImage.style.display = 'block';
                    }
                    
                    // Add to queue
                    if (!currentQueue.includes(videoId)) {
                        currentQueue.push(videoId);
                    }
                    currentIndex = currentQueue.indexOf(videoId);
                } else {
                    showError('Failed to get stream URL');
                }
            } catch (error) {
                showError('Error playing song: ' + error.message);
            }
        }

        // Toggle Play/Pause
        function togglePlay() {
            if (isPlaying) {
                audioPlayer.pause();
                playPauseBtn.textContent = '▶';
            } else {
                audioPlayer.play();
                playPauseBtn.textContent = '⏸';
            }
            isPlaying = !isPlaying;
        }

        // Update Progress
        function updateProgress() {
            const percent = (audioPlayer.currentTime / audioPlayer.duration) * 100;
            progressFill.style.width = percent + '%';
            currentTimeEl.textContent = formatTime(audioPlayer.currentTime);
        }

        // Seek To Position
        function seekTo(event) {
            const bar = event.currentTarget;
            const rect = bar.getBoundingClientRect();
            const percent = (event.clientX - rect.left) / rect.width;
            audioPlayer.currentTime = percent * audioPlayer.duration;
        }

        // Set Volume
        function setVolume(event) {
            const bar = event.currentTarget;
            const rect = bar.getBoundingClientRect();
            const percent = (event.clientX - rect.left) / rect.width;
            audioPlayer.volume = percent;
            document.getElementById('volume-fill').style.width = (percent * 100) + '%';
        }

        // Next Track
        function nextTrack() {
            if (currentQueue.length === 0) return;
            
            if (isShuffle) {
                currentIndex = Math.floor(Math.random() * currentQueue.length);
            } else {
                currentIndex = (currentIndex + 1) % currentQueue.length;
            }
            
            playSong(currentQueue[currentIndex]);
        }

        // Previous Track
        function previousTrack() {
            if (currentQueue.length === 0) return;
            
            currentIndex = currentIndex <= 0 ? currentQueue.length - 1 : currentIndex - 1;
            playSong(currentQueue[currentIndex]);
        }

        // Handle Song End
        function handleSongEnd() {
            if (repeatMode === 2) {
                audioPlayer.currentTime = 0;
                audioPlayer.play();
            } else if (repeatMode === 1 || currentIndex < currentQueue.length - 1) {
                nextTrack();
            } else {
                isPlaying = false;
                playPauseBtn.textContent = '▶';
            }
        }

        // Shuffle
        function shuffle() {
            isShuffle = !isShuffle;
            event.target.style.color = isShuffle ? 'var(--accent)' : 'var(--text-secondary)';
        }

        // Toggle Repeat
        function toggleRepeat() {
            repeatMode = (repeatMode + 1) % 3;
            const icons = ['🔁', '🔂', '🔁'];
            const colors = ['var(--text-secondary)', 'var(--accent)', 'var(--accent)'];
            event.target.textContent = icons[repeatMode];
            event.target.style.color = colors[repeatMode];
        }

        // Format Time
        function formatTime(seconds) {
            if (!seconds || isNaN(seconds)) return '0:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        // Show Error
        function showError(message) {
            document.getElementById('content-area').innerHTML = `
                <div style="text-align: center; padding: 40px; color: var(--text-secondary);">
                    <p style="font-size: 18px;">😕 ${message}</p>
                    <button class="search-btn" onclick="loadHome()" style="margin-top: 20px;">Go Home</button>
                </div>
            `;
        }

        // Show Liked Songs
        function showLikedSongs() {
            if (likedSongs.length === 0) {
                showError('No liked songs yet');
                return;
            }
            
            let html = `<div class="section"><h2 class="section-title">❤️ Liked Songs</h2><div class="song-list">`;
            
            likedSongs.forEach(songId => {
                // In a real app, you'd fetch the song details
                html += `<div class="song-item"><div class="song-info"><div class="song-name">Liked Song</div></div></div>`;
            });
            
            html += `</div></div>`;
            document.getElementById('content-area').innerHTML = html;
        }
    </script>
</body>
</html>
